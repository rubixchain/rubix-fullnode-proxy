# Rubix Fullnode Proxy — Nginx SSL Termination & Reverse Proxy
#
# This config sits in front of the Go proxy (127.0.0.1:8080) and handles:
#   - SSL/TLS termination
#   - HTTP → HTTPS redirect
#   - Hides internal service IPs and ports from external clients
#
# ─── Setup (Self-Signed Certificate) ──────────────────────────────────────────
#
#   sudo mkdir -p /etc/nginx/ssl
#   sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout /etc/nginx/ssl/rubix-proxy.key \
#     -out /etc/nginx/ssl/rubix-proxy.crt \
#     -subj "/CN=rubix-proxy"
#
#   sudo cp nginx.conf /etc/nginx/sites-available/rubix-proxy
#   sudo ln -s /etc/nginx/sites-available/rubix-proxy /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# ─── Switching to Let's Encrypt (when you have a domain) ─────────────────────
#
#   1. Replace server_name _ with your domain (e.g. proxy.example.com)
#   2. Run:
#        sudo apt install certbot python3-certbot-nginx
#        sudo certbot --nginx -d proxy.example.com
#   3. Certbot will auto-update the ssl_certificate paths and set up renewal.
#

# Redirect all HTTP traffic to HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    # ─── SSL Certificates ────────────────────────────────────────────────
    # Self-signed (replace with Let's Encrypt paths when available)
    ssl_certificate     /etc/nginx/ssl/rubix-proxy.crt;
    ssl_certificate_key /etc/nginx/ssl/rubix-proxy.key;

    # ─── SSL Hardening ───────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ─── Hide Server Identity ────────────────────────────────────────────
    server_tokens off;

    # ─── Security Headers ────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"  always;
    add_header X-Frame-Options         "DENY"     always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "no-referrer"   always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── Proxy to Go Service (localhost only) ────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # Forward real client IP
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host            $host;

        # Timeouts (match Go server timeouts)
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # Strip headers that could leak internal topology
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # Block all dot-files (e.g. .env, .git)
    location ~ /\. {
        deny all;
        return 404;
    }
}
