# Rubix Fullnode Proxy — Nginx SSL Termination (Windows)
#
# Differences from deployment/nginx.conf (Linux version):
#   - SSL cert paths use Windows location: C:/nginx/ssl/...  (forward slashes work on Windows)
#   - IPv6 `listen [::]:...` directives removed (many nginx-for-Windows builds lack IPv6 support)
#   - `default_server` modifier omitted (avoids conflict with existing server blocks in main nginx.conf)
#
# Setup (full guide in deployment/SETUP_WINDOWS.md):
#   1. Generate self-signed cert into C:\nginx\ssl\
#   2. Save this file as C:\nginx\conf\rubix-proxy.conf
#   3. In C:\nginx\conf\nginx.conf, inside the `http { }` block:
#        a. add line:  include rubix-proxy.conf;
#        b. comment out the default `server { listen 80; ... }` block
#   4. Validate: C:\nginx\nginx.exe -t -p C:\nginx\
#   5. Start:    Start-Process C:\nginx\nginx.exe -WorkingDirectory C:\nginx -WindowStyle Hidden

server {
    listen 80;
    server_name _;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     C:/nginx/ssl/rubix-proxy.crt;
    ssl_certificate_key C:/nginx/ssl/rubix-proxy.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    server_tokens off;

    add_header X-Content-Type-Options    "nosniff"       always;
    add_header X-Frame-Options           "DENY"          always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "no-referrer"   always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host              $host;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    location ~ /\. {
        deny all;
        return 404;
    }
}
